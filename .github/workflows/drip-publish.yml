name: Drip Publish (no API)

# 毎朝、content/drafts/ にストックした記事を1本だけ content/articles/ へ公開する。
# Claude/APIは一切使わない（ファイル移動のみ）。記事の生成は対話セッション(サブスク)で
# まとめて行い drafts/ に NNN-<slug>.md 形式でストックしておく。
# 公開順は NNN- の昇順。公開時に date を当日(JST)へ書き換える。
# 公開リポなので Actions 実行枠は無制限・完全無料。push後は Vercel Git連携が本番へ自動昇格。

on:
  schedule:
    - cron: "0 0 * * *" # 毎日 UTC 0:00 = JST 9:00
  workflow_dispatch:

concurrency:
  group: drip-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: ストックから1本公開
        id: pub
        run: |
          set -euo pipefail
          shopt -s nullglob
          # NNN-<slug>.md 形式のストックのみ対象（昇順）。
          # ※ glob を ls に渡すと nullglob で空展開され ls が引数なし＝
          #   リポジトリ直下を列挙してしまう事故（AGENTS.md 誤公開）を起こすため、
          #   bash 配列glob で直接受ける。マッチ無しなら配列は空。
          FILES=(content/drafts/[0-9]*-*.md)
          if [ ${#FILES[@]} -gt 0 ]; then
            IFS=$'\n' FILES=($(printf '%s\n' "${FILES[@]}" | sort)); unset IFS
          fi
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "stock=empty" >> "$GITHUB_OUTPUT"
            echo "ストックが空です（drafts/ に記事がありません）。スキップ。"
            exit 0
          fi
          SRC="${FILES[0]}"
          BASE=$(basename "$SRC")
          # 先頭の NNN- プレフィックスを除いて公開slugにする
          SLUG=$(echo "$BASE" | sed -E 's/^[0-9]+-//; s/\.md$//')
          DEST="content/articles/${SLUG}.md"
          TODAY=$(TZ=Asia/Tokyo date +%F)
          # date を当日へ書き換え（公開日＝実公開日に）
          sed -i -E "s/^date:.*/date: \"${TODAY}\"/" "$SRC"
          if [ -e "$DEST" ]; then
            echo "同名slugが既に存在: $DEST。重複のためこのストックを破棄。"
            git rm -f "$SRC"
          else
            git mv "$SRC" "$DEST"
          fi
          REMAIN=$(( ${#FILES[@]} - 1 ))
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "remain=$REMAIN" >> "$GITHUB_OUTPUT"
          echo "公開: $SLUG （残ストック $REMAIN 本）"

      - name: コミット & プッシュ
        if: steps.pub.outputs.stock != 'empty'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/articles/ content/drafts/
          git commit -m "content: drip publish - ${{ steps.pub.outputs.slug }}"
          git push origin HEAD:main

      - name: 本番200確認
        if: steps.pub.outputs.stock != 'empty'
        run: |
          SLUG="${{ steps.pub.outputs.slug }}"
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://www.litwillgarden.com/articles/${SLUG}")
            echo "($i/12) /articles/${SLUG} -> $CODE"
            [ "$CODE" = "200" ] && exit 0
            sleep 20
          done
          echo "::warning::本番200未確認（Vercil反映遅延の可能性）"

      - name: Discord通知
        if: always()
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_CONTENT }}" ]; then
            if [ "${{ steps.pub.outputs.stock }}" = "empty" ]; then
              MSG="⚠️ ドリップ公開: ストックが空です。対話セッションで記事を補充してください（content/drafts/）。"
            else
              MSG="📰 本日の記事を公開（ドリップ）: ${{ steps.pub.outputs.slug }} ／ 残ストック ${{ steps.pub.outputs.remain }} 本"
              if [ "${{ steps.pub.outputs.remain }}" -le 2 ]; then
                MSG="${MSG}\n⚠️ ストック残りわずか。補充を。"
              fi
            fi
            curl -s -H "Content-Type: application/json" -d "{\"content\": \"${MSG}\"}" "${{ secrets.DISCORD_WEBHOOK_CONTENT }}" || true
          fi
